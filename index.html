<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Guessing Game</title>
  <meta name="description" content="A fun number guessing game with difficulty levels, smart hints, and stats." />
  <meta name="theme-color" content="#0078d4" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="installBtn" class="install-btn" hidden aria-label="Install app">📲 Install App</button>

  <main class="game-card" role="main">
    <h1 class="game-title">🎯 Guess the Number</h1>
    <p class="range-hint" id="rangeHint" aria-live="polite"></p>

    <label for="difficulty" class="sr-only">Select difficulty</label>
    <select id="difficulty" aria-label="Select difficulty level">
      <option value="easy">🟢 Easy (1–50)</option>
      <option value="medium" selected>🟡 Medium (1–100)</option>
      <option value="hard">🔴 Hard (1–500)</option>
    </select>

    <label for="guessInput" class="sr-only">Enter your guess</label>
    <input
      type="number"
      id="guessInput"
      placeholder="Guess (1–100)"
      min="1"
      max="100"
      aria-label="Enter a number between 1 and 100"
      aria-describedby="rangeHint feedback"
      autocomplete="off"
    />

    <div class="button-group">
      <button id="submitBtn" type="button" aria-label="Submit guess" disabled>Submit</button>
      <button id="resetBtn" type="button" aria-label="Play again">🔄 Play Again</button>
    </div>

    <p id="feedback" class="feedback" aria-live="assertive" aria-atomic="true"></p>
    <p id="hintMessage" class="hint-message" aria-live="polite"></p>

    <div id="winCelebration" class="win-celebration" hidden aria-hidden="true"></div>

    <section id="currentStats" class="current-stats" aria-label="Current game stats"></section>

    <details id="historyDetails" class="history-details">
      <summary>📜 Game History</summary>
      <div id="gameHistory" class="game-history"></div>
    </details>

    <section id="statsPanel" class="stats-panel" aria-label="Overall statistics"></section>

    <div class="action-row">
      <button id="resetStatsBtn" type="button" class="secondary-btn" aria-label="Reset all statistics">🗑️ Reset Stats</button>
      <button id="toggleDarkBtn" type="button" class="secondary-btn" aria-label="Toggle dark mode">🌙 Dark Mode</button>
      <button id="toggleSoundBtn" type="button" class="secondary-btn" aria-label="Toggle sound">🔊 Sound On</button>
    </div>

    <p class="keyboard-hint">
      <kbd>Enter</kbd> Submit &middot; <kbd>R</kbd> Reset &middot; <kbd>D</kbd> Difficulty
    </p>
  </main>

  <script src="game.js"></script>
</body>
</html>
